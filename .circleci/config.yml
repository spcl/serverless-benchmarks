version: 2.1

orbs:
  python: circleci/python@2.1

# Executor for regression testing jobs
executors:
  sebs-regression:
    docker:
      - image: cimg/python:3.11
    resource_class: large
    environment:
      RESOURCE_PREFIX: sebs-ci

commands:

  restore-sebs-cache:
    description: "Restore SeBS cache directory containing cloud resource metadata"
    steps:
      - restore_cache:
          keys:
            - sebs-cache-{{ .Branch }}

  save-caches:
    description: "Persist SeBS cache and dependencies"
    parameters:
      language:
        type: enum
        enum: [python, nodejs, java, cpp]
    steps:
      - save_cache:
          key: sebs-cache-{{ .Branch }}
          paths:
            - cache/

jobs:
  linting:
    executor:
       name: 'python/default'
       tag: '3.10'
    steps:
      - checkout
      - restore_cache:
          key: deps1-{{ .Branch }}-{{ checksum "requirements.txt" }}
      - run:
          command: |
            sudo apt update && sudo apt install libcurl4-openssl-dev
          name: Install curl-config from Ubuntu APT
      - run:
          command: |
            python3 install.py --aws --azure --gcp --no-local
          name: Install pip dependencies
      - run:
          command: |
            . python-venv/bin/activate
            black sebs --check --config .black.toml
          name: Python code formatting with black
      - run:
          command: |
            . python-venv/bin/activate
            flake8 sebs --config=.flake8.cfg --tee --output-file flake-reports
          name: Python code lint with flake8
      - run:
          command: |
            . python-venv/bin/activate
            mypy sebs --config-file=.mypy.ini
          name: Python static code verification with mypy
      - run:
          command: |
            . python-venv/bin/activate
            interrogate -v --fail-under 100 sebs
          name: Check for Python documentation coverage 
      - store_artifacts:
          path: flake-reports
          destination: flake-reports

  install-sebs:
    description: "Install SeBS with platform-specific dependencies"
    parameters:
      platform:
        type: enum
        enum: [aws, azure, gcp]
    steps:
      - run:
          name: Install SeBS
          command: pip install .

  setup-cloud-credentials:
    description: "Configure cloud authentication"
    parameters:
      platform:
        type: enum
        enum: [aws, azure, gcp]
    steps:
      - when:
          condition:
            equal: [gcp, << parameters.platform >>]
          steps:
            - run:
                name: Setup GCP Credentials
                command: |
                  echo "$GCP_SERVICE_ACCOUNT_JSON" > /tmp/gcp-credentials.json
                  echo 'export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-credentials.json' >> $BASH_ENV

  run-regression-tests:
    description: "Execute regression test suite"
    parameters:
      platform:
        type: enum
        enum: [aws, azure, gcp]
      language:
        type: enum
        enum: [python, nodejs, java, cpp]
      version:
        type: string
    steps:
      - run:
          name: Run Regression Tests
          command: |
            sebs benchmark regression \
              --config config/example.json \
              --deployment << parameters.platform >> \
              --language << parameters.language >> \
              --language-version << parameters.version >>
          no_output_timeout: 5m

  regression-aws-python311:
    executor: sebs-regression
    steps:
      - checkout
      - restore-sebs-cache
      - setup_remote_docker:
          version: 20.10.24
      - setup-cloud-credentials:
          platform: aws
      - install-sebs:
          platform: aws
      - run-regression-tests:
          platform: aws
          language: python
          version: "3.11"
      - save-results
      - save-caches:
          language: python

workflows:
  main:
    jobs:
      - linting

  regression-tests:
    jobs:
      # AWS jobs
      - regression-aws-python311:
          filters:
            branches:
              only: master
